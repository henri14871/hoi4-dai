# Equipment archetype mappings
equipment:
  EQUIP_INFANTRY:     [Inf_equipment]
  EQUIP_ARTILLERY:    [artillery_equipment]
  EQUIP_ANTI_TANK:    [L_AT_Equipment, H_AT_Equipment]
  EQUIP_ANTI_AIR:     [AA_Equipment]
  EQUIP_MOTORIZED:    [util_vehicle_equipment]
  EQUIP_ARMOUR:       [medium_tank_chassis, heavy_tank_chassis]
  EQUIP_FIGHTER:      [small_plane_airframe]
  EQUIP_CAS:          [small_plane_airframe]
  EQUIP_BOMBER:       [medium_plane_airframe, large_plane_airframe]
  EQUIP_CAPITAL_SHIP: [carrier, battleship]
  EQUIP_SCREEN:       [destroyer, frigate, corvette, cruiser]
  EQUIP_SUBMARINE:    [attack_submarine, missile_submarine]
  EQUIP_CONVOY:       [convoy]
  EQUIP_SUPPORT:      [cnc_equipment]

# Ideologies — MD has 5 groups
ideologies:
  democratic:   { category: defensive,  aggression: -0.15 }
  communism:    { category: moderate,   aggression: 0.15 }
  fascism:      { category: aggressive, aggression: 0.30 }
  neutrality:   { category: neutral,    aggression: 0.0 }
  nationalist:  { category: moderate,   aggression: 0.20 }

# MD completely replaces laws — economy uses military spending tiers
economy_laws:
  - defence_00
  - defence_01
  - defence_02
  - defence_03
  - defence_04
  - defence_05
  - defence_06
  - defence_07
  - defence_08
  - defence_09

# Conscription
conscription_laws:
  - no_military
  - volunteer_army
  - partial_draft_army
  - draft_army

# Trade
trade_laws:
  - md_closed_economy
  - consumption_economy
  - semi_consumption_economy
  - mixed_economy
  - export_economy
  - globalized_trade_economy
