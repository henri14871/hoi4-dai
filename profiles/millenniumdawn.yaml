###############################################################################
# DAI Profile for Millennium Dawn: A Modern Day Mod
# Total conversion set in the year 2000. All game content is different.
#
# NOTE: MD does not set a global flag on startup.
# Select this profile manually via game rule.
###############################################################################

profile_name: millenniumdawn
game_version: "1.15.*"
description: "Millennium Dawn: A Modern Day Mod"
priority: 10

# MD does not set an unconditional startup global flag.
detection_hints: {}

area_mappings: [europe, asia, pacific, africa, middle_east, south_america, north_america]

