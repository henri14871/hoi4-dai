# Ideologies — TFR has 11 ideology groups
ideologies:
  totalitarian_socialist: { category: aggressive, aggression: 0.25 }
  communist:              { category: moderate,   aggression: 0.15 }
  libertarian_socialist:  { category: defensive,  aggression: -0.05 }
  social_democrat:        { category: defensive,  aggression: -0.15 }
  social_liberal:         { category: defensive,  aggression: -0.10 }
  market_liberal:         { category: neutral,    aggression: -0.05 }
  conservative:           { category: neutral,    aggression: 0.0 }
  authoritarian_democrat: { category: moderate,   aggression: 0.10 }
  nationalist:            { category: aggressive, aggression: 0.20 }
  fascist:                { category: aggressive, aggression: 0.30 }
  national_socialist:     { category: aggressive, aggression: 0.35 }

