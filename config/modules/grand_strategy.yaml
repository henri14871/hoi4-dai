###############################################################################
# DAI Grand Strategy Module Configuration
# Diplomacy, faction logic, trade, economic laws, and mobilisation
###############################################################################

module_name: grand_strategy
namespace: dai_gs
enabled_flag: DAI_GS_ENABLED
game_rule: dai_gs_module

# =============================================================================
# Diplomacy Strategies (profile-independent — uses generic triggers)
# =============================================================================
diplomacy_strategies:

  # --- Faction and alliance behaviour ---
  - type: force_defend_ally_borders
    base_value: 40
    desc: "Willingness to defend allies — scales with actual border exposure"
    factors:
      - desc: "Boost when at peace but ally's enemy neighbours us"
        trigger: { has_war: "no", check_variable: { var: dai_faction_border_threat, compare: greater_than, value: 10 } }
        factor_add: 40
      - desc: "Major boost when neighbour is at war with our ally"
        trigger: { check_variable: { var: dai_faction_border_threat, compare: greater_than, value: 30 } }
        factor_add: 30
      - desc: "Maximum when at war ourselves"
        trigger: { has_war: "yes" }
        factor_add: 40
      - desc: "Reduce for isolationist nations"
        trigger: { check_variable: { var: dai_political_diplo_stance, compare: less_than, value: -0.05 } }
        factor_add: -20
      - desc: "Puppets always defend master's borders"
        trigger: { check_variable: { var: dai_is_puppet, compare: greater_than, value: 0.5 } }
        factor_add: 60
      - desc: "Faction leaders must defend allies"
        trigger: { check_variable: { var: dai_is_faction_leader, compare: greater_than, value: 0.5 } }
        factor_add: 30

  - type: dont_defend_ally_borders
    base_value: 0
    desc: "Refusal to defend distant allies — but NOT when threat is on our border"
    factors:
      - desc: "Boost when own borders extremely threatened (all hands on deck)"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 70 } }
        factor_add: 50
      - desc: "Boost for isolationist AI"
        trigger: { check_variable: { var: dai_political_diplo_stance, compare: less_than, value: -0.1 } }
        factor_add: 30
      - desc: "REDUCE refusal when ally's enemy is on our border (this IS our problem)"
        trigger: { check_variable: { var: dai_faction_border_threat, compare: greater_than, value: 20 } }
        factor_add: -40
      - desc: "Puppets never refuse to defend master"
        trigger: { check_variable: { var: dai_is_puppet, compare: greater_than, value: 0.5 } }
        factor_add: -50

  # --- War declaration evaluation ---
  - type: prepare_for_war
    base_value: 20
    desc: "General war preparation urgency"
    factors:
      - desc: "Aggressive nations prepare earlier"
        trigger: { check_variable: { var: dai_political_aggression, compare: greater_than, value: 0.1 } }
        factor_add: 50
      - desc: "High threat drives full preparation"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 50 } }
        factor_add: 50
      - desc: "Moderate threat warrants strong preparation"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 25 } }
        factor_add: 30
      - desc: "Even low threat means basic readiness"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 10 } }
        factor_add: 15
      - desc: "Smart AI prepares earlier"
        trigger: { check_variable: { var: dai_effective_intelligence, compare: greater_than, value: 1.2 } }
        factor_add: 20
      - desc: "Puppets don't independently prepare for wars"
        trigger: { check_variable: { var: dai_is_puppet, compare: greater_than, value: 0.5 } }
        factor_add: -40
      - desc: "Faction leaders prepare more aggressively"
        trigger: { check_variable: { var: dai_is_faction_leader, compare: greater_than, value: 0.5 } }
        factor_add: 25
      - desc: "Weak nations should prepare harder"
        trigger: { check_variable: { var: dai_military_score, compare: less_than, value: 40 } }
        factor_add: 20
      - desc: "High war support enables faster mobilization"
        trigger: { check_variable: { var: dai_war_support_status, compare: greater_than, value: 0.6 } }
        factor_add: 15

  # --- Lend-lease behaviour ---
  - type: send_lend_lease_desire
    base_value: 0
    desc: "Willingness to send lend-lease"
    factors:
      - desc: "Boost for diplomatic nations"
        trigger: { check_variable: { var: dai_political_diplo_stance, compare: greater_than, value: 0.05 } }
        factor_add: 40
      - desc: "Boost when ally is at war"
        trigger: { has_war: "no" }
        factor_add: 20
      - desc: "Reduce when own equipment is low"
        trigger: { check_variable: { var: dai_equipment_ratio, compare: less_than, value: 0.5 } }
        factor_add: -50
      - desc: "Faction leaders send more lend-lease"
        trigger: { check_variable: { var: dai_is_faction_leader, compare: greater_than, value: 0.5 } }
        factor_add: 30
      - desc: "No lend-lease during civil war"
        trigger: { check_variable: { var: dai_has_civil_war, compare: greater_than, value: 0.5 } }
        factor_add: -100

  # --- Volunteer sending ---
  - type: send_volunteers_desire
    base_value: 0
    desc: "Willingness to send volunteers"
    factors:
      - desc: "Aggressive nations send volunteers"
        trigger: { check_variable: { var: dai_political_aggression, compare: greater_than, value: 0.1 } }
        factor_add: 30
      - desc: "Communist nations support aligned wars"
        trigger: { check_variable: { var: dai_political_diplo_stance, compare: greater_than, value: 0.05 } }
        factor_add: 20
      - desc: "Puppets don't send volunteers independently"
        trigger: { check_variable: { var: dai_is_puppet, compare: greater_than, value: 0.5 } }
        factor_add: -20
      - desc: "No volunteers during civil war"
        trigger: { check_variable: { var: dai_has_civil_war, compare: greater_than, value: 0.5 } }
        factor_add: -100

# =============================================================================
# Economy Strategies — mobilisation timing and factory balance
# The mobilisation_timing entries are profile-independent (use generic
# ai_strategy types). Law-specific strategies reference profile law IDs.
# =============================================================================
economy_strategies:

  # --- Mobilisation timing (profile-independent) ---
  - type: added_military_to_civilian_factory_ratio
    base_value: 30
    desc: "Military-to-civilian factory construction ratio"
    factors:
      - desc: "Shift to military when threat high"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 40 } }
        factor_add: 30
      - desc: "Major shift when at war"
        trigger: { has_war: "yes" }
        factor_add: 50
      - desc: "Keep civilian focus when safe"
        trigger: { has_war: "no", check_variable: { var: dai_threat_index, compare: less_than, value: 20 } }
        factor_add: -20
      - desc: "Fascist nations militarise earlier"
        trigger: { check_variable: { var: dai_political_mil_priority, compare: greater_than, value: 0.1 } }
        factor_add: 20
      - desc: "Democracies delay mobilisation"
        trigger: { check_variable: { var: dai_political_mil_priority, compare: less_than, value: -0.05 } }
        factor_add: -15
      - desc: "Buildup posture: favour civilian growth"
        trigger: { check_variable: { var: dai_strategic_posture, compare: less_than, value: 0.5 } }
        factor_add: -20
      - desc: "Total war posture: maximum military shift"
        trigger: { check_variable: { var: dai_strategic_posture, compare: greater_than, value: 3.5 }, check_variable_2: { var: dai_strategic_posture, compare: less_than, value: 4.5 } }
        factor_add: 60

  # --- Equipment stockpile surplus (sell/trade threshold) ---
  - type: equipment_stockpile_surplus_ratio
    base_value: 20
    desc: "How much surplus equipment to maintain"
    factors:
      - desc: "Build stockpile when threat high"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 40 } }
        factor_add: 20
      - desc: "Less surplus when at war (use everything)"
        trigger: { has_war: "yes" }
        factor_add: -15

  # --- Supply train production ---
  - type: min_wanted_supply_trains
    base_value: 60
    desc: "Minimum supply trains desired"
    factors:
      - desc: "More trains when at war"
        trigger: { has_war: "yes" }
        factor_add: 50
      - desc: "More for large nations"
        trigger: { check_variable: { var: dai_gps, compare: greater_than, value: 60 } }
        factor_add: 30
      - desc: "Boost when supply strained"
        trigger: { check_variable: { var: dai_supply_strain, compare: greater_than, value: 0.5 } }
        factor_add: 40
      - desc: "Major boost during supply crisis"
        trigger: { check_variable: { var: dai_supply_strain, compare: greater_than, value: 0.7 } }
        factor_add: 60
      - desc: "Boost for large occupied territory"
        trigger: { check_variable: { var: dai_occupied_territory_size, compare: greater_than, value: 50 } }
        factor_add: 30

# =============================================================================
# Economy Law Strategies (per-profile — law IDs vary between mods)
# These use pp_spend_priority to nudge the AI toward changing laws.
# =============================================================================
economy_law_strategies:
  - desc: "Mobilise economy based on threat level"
    factors:
      - desc: "Rush to war economy when at war"
        trigger: { has_war: "yes" }
        priority: 100
      - desc: "Start mobilising when threat imminent"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 60 } }
        priority: 70
      - desc: "Begin mobilisation when threat moderate"
        trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 35 } }
        priority: 40
      - desc: "Fascist nations mobilise earlier"
        trigger: { check_variable: { var: dai_political_mil_priority, compare: greater_than, value: 0.1 } }
        priority_add: 20

  - desc: "Expand conscription based on manpower needs"
    factors:
      - desc: "Conscript when manpower critical"
        trigger: { check_variable: { var: dai_manpower_ratio, compare: less_than, value: 0.2 } }
        priority: 80
      - desc: "Expand when at war with low manpower"
        trigger: { has_war: "yes", check_variable: { var: dai_manpower_ratio, compare: less_than, value: 0.4 } }
        priority: 60
      - desc: "EMERGENCY: manpower completely depleted, force conscription upgrade"
        trigger: { check_variable: { var: dai_manpower_ratio, compare: less_than, value: 0.1 } }
        priority: 100
      - desc: "EMERGENCY: at war with depleting manpower"
        trigger: { has_war: "yes", check_variable: { var: dai_manpower_ratio, compare: less_than, value: 0.2 } }
        priority: 90
      - desc: "Cannot upgrade conscription without sufficient war support"
        trigger: { check_variable: { var: dai_war_support_status, compare: less_than, value: 0.3 } }
        priority: -50

# =============================================================================
# Peace Conference Strategies (profile-independent)
# =============================================================================
peace_strategies:
  - desc: "Strategic territory over max land grab"
    base_aggressive: 30
    base_strategic: 50
    base_puppet: 20
    base_liberate: 10
    factors:
      - desc: "Aggressive nations grab more land"
        trigger: { check_variable: { var: dai_political_aggression, compare: greater_than, value: 0.1 } }
        aggressive_add: 20
        strategic_add: -10
      - desc: "Smart AI takes strategic positions"
        trigger: { check_variable: { var: dai_effective_intelligence, compare: greater_than, value: 1.2 } }
        strategic_add: 20
        aggressive_add: -10
      - desc: "Democracies prefer puppeting"
        trigger: { check_variable: { var: dai_political_aggression, compare: less_than, value: -0.05 } }
        puppet_add: 20
        aggressive_add: -15
      - desc: "Democracies prefer liberation over annexation"
        trigger: { check_variable: { var: dai_political_aggression, compare: less_than, value: -0.1 } }
        liberate_add: 30
        aggressive_add: -20
      - desc: "Nuclear powers are more assertive in peace deals"
        trigger: { check_variable: { var: dai_has_nukes, compare: greater_than, value: 0.5 } }
        strategic_add: 15

# =============================================================================
# Political Power Spending Priorities
# Controls how AI allocates political power between advisors, decisions, laws
# =============================================================================
pp_spend_strategies:
  - type: pp_spend_priority
    entries:
      - id: idea
        base_value: 50
        desc: "Political advisors and ministers"
        factors:
          - desc: "High priority early game (advisors matter most early)"
            trigger: { has_war: "no", check_variable: { var: dai_industry_score, compare: less_than, value: 40 } }
            factor_add: 30
          - desc: "Reduce during war (save PP for decisions)"
            trigger: { has_war: "yes" }
            factor_add: -20
          - desc: "Boost when mobilisation urgency low (spend on advisors)"
            trigger: { check_variable: { var: dai_gs_mobilisation_urgency, compare: less_than, value: 30 } }
            factor_add: 20
          - desc: "Boost advisor spending when stability critically low"
            trigger: { check_variable: { var: dai_stability_status, compare: less_than, value: 0.3 } }
            factor_add: 40

      - id: decision
        base_value: 30
        desc: "Decisions and active abilities"
        factors:
          - desc: "Boost when at war (wartime decisions critical)"
            trigger: { has_war: "yes" }
            factor_add: 40
          - desc: "Boost for high threat (war preparation decisions)"
            trigger: { check_variable: { var: dai_threat_index, compare: greater_than, value: 50 } }
            factor_add: 25
          - desc: "Boost decision spending when stability low (stability decisions)"
            trigger: { check_variable: { var: dai_stability_status, compare: less_than, value: 0.4 } }
            factor_add: 30

      - id: law
        base_value: 40
        desc: "Economy and conscription law changes"
        factors:
          - desc: "Boost when mobilisation urgency is high"
            trigger: { check_variable: { var: dai_gs_mobilisation_urgency, compare: greater_than, value: 50 } }
            factor_add: 40
          - desc: "Critical boost when manpower depleted"
            trigger: { check_variable: { var: dai_manpower_ratio, compare: less_than, value: 0.2 } }
            factor_add: 50
          - desc: "Reduce when already at total war posture"
            trigger: { check_variable: { var: dai_strategic_posture, compare: greater_than, value: 3.5 } }
            factor_add: -30

# =============================================================================
# Experience Spending Priorities
# Controls doctrine research and template editing with XP
# =============================================================================
xp_spend_strategies:
  - type: land_xp_spend_priority
    base_value: 100
    desc: "Land XP spending on doctrines and templates"
    factors:
      - desc: "Prioritise doctrine at peace"
        trigger: { has_war: "no" }
        factor_add: 50
      - desc: "Shift to template editing at war when equipped"
        trigger: { has_war: "yes", check_variable: { var: dai_equipment_ratio, compare: greater_than, value: 0.5 } }
        factor_add: -30
      - desc: "Low industry nations should research doctrine not edit templates"
        trigger: { check_variable: { var: dai_industry_score, compare: less_than, value: 30 } }
        factor_add: 30

  - type: air_xp_spend_priority
    base_value: 80
    desc: "Air XP spending on air doctrines"
    factors:
      - desc: "Prioritise doctrine when air threat high"
        trigger: { check_variable: { var: dai_air_threat, compare: greater_than, value: 0.3 } }
        factor_add: 40
      - desc: "Industrial powers can afford to design variants"
        trigger: { check_variable: { var: dai_industry_score, compare: greater_than, value: 50 } }
        factor_add: -20

  - type: navy_xp_spend_priority
    base_value: 60
    desc: "Navy XP spending on naval doctrines"
    factors:
      - desc: "Boost doctrine when naval threat high"
        trigger: { check_variable: { var: dai_naval_threat, compare: greater_than, value: 0.3 } }
        factor_add: 40
      - desc: "Major powers invest more in naval doctrine"
        trigger: { check_variable: { var: dai_gps, compare: greater_than, value: 60 } }
        factor_add: 20

# =============================================================================
# Espionage Strategies (La Resistance DLC)
# =============================================================================
espionage_strategies:
  - type: intelligence_agency_usable_factories
    base_value: 2
    desc: "Number of factories to allocate to intelligence agency"
    factors:
      - desc: "More factories during war"
        trigger: { has_war: "yes" }
        factor_add: 2
      - desc: "Major powers invest more in intelligence"
        trigger: { check_variable: { var: dai_gps, compare: greater_than, value: 60 } }
        factor_add: 1

# Game rule options
game_rule_options:
  diplomatic_stance:
    - name: isolationist
      desc: "AI avoids alliances and factions"
    - name: cautious
      desc: "AI joins factions only when threatened"
    - name: dynamic
      desc: "AI evaluates faction value dynamically (default)"
    - name: interventionist
      desc: "AI actively seeks alliances and intervenes"
